<!-- cart.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — Posuda_Sona</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo"><a href="index.html">Posuda_Sona</a></div>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="cart-icon">
          <i class="fas fa-shopping-cart"></i>
          <span id="cart-count"></span>
        </a>
        <button class="theme-toggle" id="theme-toggle"><i class="fas fa-moon"></i></button>
        <div id="user-info" class="user-info"></div>
      </div>
    </div>
  </header>

  <main class="fade-in container">
    <h1>Корзина</h1>
    <div id="cart-content"></div>
  </main>

  <footer class="footer">
    <div class="container">
      <span>© 2025 Posuda_Sona</span>
      <div class="social-links">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
        <a href="#"><i class="fab fa-vk"></i></a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.updateHeaderAuth();
      const user = App.getCurrentUser();
      const container = document.getElementById('cart-content');

      if (!user || user.isAdmin) {
        container.innerHTML = '<p class="empty-message">Войдите как покупатель, чтобы увидеть корзину.</p>';
        return;
      }

      function renderCart() {
        const cart = App.getCart(user.username);
        if (cart.length === 0) {
          container.innerHTML = '<p class="empty-message">Ваша корзина пуста</p>';
          return;
        }

        let itemsHtml = '<div class="cart-items">';
        let total = 0;
        cart.forEach(item => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          itemsHtml += `
            <div class="cart-item">
              <div style="display:flex; align-items:center; gap:1rem;">
                <span style="font-size:2rem;">${item.icon}</span>
                <div>
                  <div style="font-weight:600;">${item.name}</div>
                  <div>${item.price} ₽ x ${item.quantity}</div>
                </div>
              </div>
              <div style="font-weight:600;">${itemTotal} ₽</div>
            </div>
          `;
        });
        itemsHtml += '</div>';
        itemsHtml += `<div class="cart-total">Итого: ${total} ₽</div>`;
        itemsHtml += `<button class="btn btn-block" id="checkout-btn">Оформить заказ</button>`;
        container.innerHTML = itemsHtml;

        document.getElementById('checkout-btn').addEventListener('click', () => {
          const cart = App.getCart(user.username);
          if (cart.length === 0) return;
          const order = App.createOrder(user.username, cart);
          App.saveCart(user.username, []);
          alert(`Заказ №${order.id} оформлен! Статус: Новая.`);
          renderCart();
          App.updateCartCounter();
        });
      }

      renderCart();
    });
  </script>
</body>
</html>
